<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./cardapio.js" defer type="module"></script>
    <link rel="stylesheet" href="./cardapio.css">
    <title>Honker Burguer - CARDÁPIO</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="../imagens/logo.png" alt="logo">
        </div>
        <div class="abas">
            <h2 id="inicio">INICIO</h2>
            <h2 id="categoria">CATEGORIAS</h2>
            <input class="buscar" type="search" id="buscar" placeholder="Buscar ....">
        </div>
    </header>
    <main>
        <div>
            <h2>CARDÁPIO TEMATICO</h2>
        </div>
            <!-- Grade onde as caixas de lanches vão aparecer dinamicamente -->
        <div id="containerProduto" class="grade-produtos">
            <!-- Os cards dos lanches serão injetados pelo JavaScript -->
        </div>
    </main>
    <footer>
        <div class="dados">
            <img src="../imagens/Phone.png" alt="Ícone de telefone">
            <div class="contatos">
                <p>+55 11 98765-0345</p>
                <p>honkerburguer@gmail.com</p>
            </div>
        </div>
        <div class="dados">
            <img src="../imagens/Location.png" alt="endereço">
            <p>Av. Marcel Fernando de Yuri</p>
        </div>
        <div class="dados">
            <img src="../imagens/Speech Bubble.png" alt="redes sociais">
            <p>@honkerburguer.art</p>
        </div>
        <div class="dados">
            <img src="../imagens/bat.png" alt="empresa">
            <p>DESENVOLVIDO POR ARCADIA SYSTEMS</p>
        </div>
    </footer>
</body>
</html>
