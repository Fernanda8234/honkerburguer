<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/resete.css">
    <link rel="stylesheet" href="./inicio.css">
    <title>Honker Burguer - Hamburgueria Temática</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="./imagens/logo.png" alt="logo">
        </div>
        <div class="abas">
            <h2>CATÁLOGO</h2>
            <h2>CATEGORIAS</h2>
            <h2>COMBOS</h2>
            <input class="buscar" type="search" id="buscar" placeholder="Buscar ....">
        </div>
    </header>
    <main>
        <div class="topo">
            <div class="mensagem">
                <h2>SMASH HERO</h2>
                <p>hambúgueres artesanais com smash suculento e </p>
                <p>sabores dignos de verdadeiros heróis</p>
            </div>
            <div>
                <img src="./imagens/cidade.png" alt="cidade">
            </div>
        </div>
        <!-- Grade onde as caixas de lanches vão aparecer dinamicamente -->
        <div id="containerContatos" class="grade-lanches">
            <!-- Os cards dos lanches serão injetados pelo JavaScript -->
        </div>
    </main>
    <footer>
        <div class="dados">
            <img src="./imagens/Phone.png" alt="Ícone de telefone">
            <div class="contatos">
                <p>+55 11 98765-0345</p>
                <p>honkerburguer@gmail.com</p>
            </div>
        </div>
        <div class="dados">
            <img src="./imagens/Location.png" alt="endereço">
            <p>Av. Marcel Fernando de Yuri</p>
        </div>
        <div class="dados">
            <img src="./imagens/Speech Bubble.png" alt="redes sociais">
            <p>@honkerburguer.art</p>
        </div>
        <div class="dados">
            <img src="./imagens/bat.png" alt="empresa">
            <p>DESENVOLVIDO POR ARCADIA SOFTWARES</p>
        </div>
    </footer>
</body>
</html>
