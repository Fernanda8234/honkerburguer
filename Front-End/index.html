<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>Honker Burguer - Hamburgueria Temática</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="./imagens/logo.png" alt="logo">
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="titulo">
                <h1 class="titulo1">HONKER </h1>
                <h1 class="titulo2">BURGUER</h1>
                <h2>Sabores que salvam o dia</h2>
                <p>Hambúgueres artesanais inspirados no universo dos quadrinhos</p>
                <button id="btn-catalogo" class="catalogo">CATÁLOGO</button>
            </div>
        </section>
        
        <div class="sobre-nos">
            <h2>SOBRE NÓS</h2>
            <img src="./imagens/historia.png" alt="Nossa historia">
        </div>
    </main>
    <footer>
        <div>
            <img src="./imagens/Phone.png" alt="Ícone de telefone">
            <div class="contatos">
                <p>+55 11 98765-0345</p>
                <p>honkerburguer@gmail.com</p>
            </div>
        </div>
        <div>
            <img src="./imagens/Location.png" alt="endereço">
            <p>Av. Marcel Fernando de Yuri</p>
        </div>
        <div>
            <img src="./imagens/Speech Bubble.png" alt="redes sociais">
            <p>@honkerburguer.art</p>
        </div>
        <div>
            <img src="./imagens/bat.png" alt="empresa">
            <p>DESENVOLVIDO POR ARCADIA SOFTWARES</p>
        </div>
    </footer>    
</body>
</html>
