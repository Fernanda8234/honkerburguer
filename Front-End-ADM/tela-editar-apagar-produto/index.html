<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/resete.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/app.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>Área Administrativa</title>
</head>
<body>
    <header>
        <img src="./img/menu.png" alt="">
        <button id="voltar" id="sair" class="sair" onclick="window.history.back()">voltar</button>
    </header>
    <main>
        <div class="container">
            <form id="form-produto">

                <section>
                    <label class="produto">
                        <img id="preview" src="../img/add produto.png">
                    </label>
                    <label class="campo" for="url_imagem">URL da Imagem</label>
                    <input type="url" id="url_imagem" required>
                </section>
    
                <section>
                    <label class="campo" for="nome">Nome</label>
                    <input type="text" id="nome" required>

                    <label class="campo" for="descricao">Descrição</label>
                    <textarea name="descricao" id="descricao" rows="20" required></textarea>
                </section>

                <section>
                    <label class="campo" for="preco">Preço</label>
                    <input type="number" id="numero" step="0.01" required>

                    <label class="campo" for="desconto">Desconto</label>
                    <input type="number" id="desconto" step="0.01">

                    <label class="campo" for="data_inicio">Data Início Campanha</label>
                    <input type="datetime-local" id="data_inicio">

                    <label class="campo" for="data_fim">Data Fim Campanha</label>
                    <input type="datetime-local" id="data_fim">
                </section>

                <section id="section-categorias">
                    <label class="campo">Categoria</label>

                </section>

                <section id="section-combos">
                    <label class="campo">Vincular a um Combo</label>

                </section>

                <section>
                    <label class="campo" for="blend">Tamanho do Blend (g)</label>
                    <input type="number" id="blend">

                    <label class="campo" for="classificacao_alimentar">Classificação Alimentar</label>
                    <select id="classificacao_alimentar">
                        <option value="Tradicional">Tradicional</option>
                        <option value="Vegano">Vegano</option>
                        <option value="Vegetariano">Vegetariano</option>
                    </select>
                </section>

                <section>
                    <label class="checkbox-custom">
                        <input type="checkbox" id="disponibilidade" value="1">
                        <span class="checkmark"></span>
                        Disponível no cardápio
                    </label>
                </section>

                <section class="botoes">
                    <button type="submit" id="atualizar">Atualizar</button>
                    <button type="button" id="deletar">Deletar</button>
                </section>
            </form>
        </div>
    </main>
</body>
</html>
