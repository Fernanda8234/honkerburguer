openapi: 3.0.3

info:
  title: Cardápio Virtual - Hamburgueria
  description: API pública para gerenciamento do cardápio virtual da hamburgueria (Projeto SENAI).
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Ambiente Local

tags:
  - name: PRODUTO
  - name: ADMINISTRADOR
  - name: INGREDIENTE
  - name: CATEGORIA
  - name: TIPO_SABOR
  - name: COMBO

paths:

  /v1/senai/hamburgueria/produtos:
    get:
      tags: [PRODUTO]
      summary: Lista todos os produtos
      description: Retorna uma lista com todos os produtos cadastrados no cardápio.
      responses:
        '200':
          description: Lista de produtos retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Produto'
        '500':
          description: Erro interno no servidor.

    post:
      tags: [PRODUTO]
      summary: Cria um novo produto
      description: Cadastra um novo produto no cardápio virtual.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProdutoInput'
      responses:
        '201':
          description: Produto criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Produto'
        '400':
          description: Dados de entrada inválidos.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/produtos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID numérico do produto.
        schema:
          type: integer
          example: 1

    get:
      tags: [PRODUTO]
      summary: Busca um produto pelo ID
      description: Retorna os dados completos de um produto específico pelo seu identificador.
      responses:
        '200':
          description: Produto encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Produto'
        '400':
          description: ID inválido.
        '404':
          description: Produto não encontrado.
        '500':
          description: Erro interno no servidor.

    put:
      tags: [PRODUTO]
      summary: Atualiza um produto existente
      description: Atualiza os dados de um produto específico pelo seu identificador.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProdutoInput'
      responses:
        '200':
          description: Produto atualizado com sucesso.
        '400':
          description: ID ou dados inválidos.
        '404':
          description: Produto não encontrado.
        '500':
          description: Erro interno no servidor.

    delete:
      tags: [PRODUTO]
      summary: Exclui um produto pelo ID
      description: Remove permanentemente um produto do cardápio pelo seu identificador.
      responses:
        '200':
          description: Produto excluído.
        '400':
          description: ID inválido.
        '404':
          description: Produto não encontrado.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/administradores:
    get:
      tags: [ADMINISTRADOR]
      summary: Lista todos os administradores
      description: Retorna uma lista com todos os administradores cadastrados no sistema.
      responses:
