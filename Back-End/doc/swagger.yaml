openapi: 3.0.3
info:
  title: Cardápio Virtual - Hamburgueria
  description: API pública para gerenciamento do cardápio virtual da hamburgueria (Projeto SENAI).
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Ambiente Local

tags:
  - name: PRODUTO
  - name: ADMINISTRADOR
  - name: IGREDIENTE
  - name: CATEGORIA
  - name: TIPO_SABOR


paths:
  /v1/senai/hamburgueria/produtos:
    get:
      tags: [PRODUTO]
      summary: Lista todos os produtos
      description: Retorna uma lista com todos os produtos cadastrados no cardápio.
      responses:
        '200':
          description: Lista de produtos retornado com sucesso.
          content:
            application:json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/produto'
        '500':
          description: Erro interno no servidor.

    post:
      tags: [PRODUTO]
      summary: Cria um novo produto
      description: Cadastra um novo produto no cardápio virtual.
      requestBody:
        required: true
        content:
          application:json:
            schema:
              $ref: '#/components/schemas/produtoInput'
      responses:
        '201':
          description: Produto criado com sucesso.
          content:
            application:json:
              schema:
                $ref: '#/components/schemas/produto'
        '400':
          description: Dados de entrada inválidos.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/produtos{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID numérico do produto
        schema:
          type: integer

    get:
      tags: [PRODUTO]
      summary: Busca um produto pelo ID
      responses:
        '200':
          description: Produto encontrada.
          content:
            application:json:
              schema:
                $ref: '#/components/schemas/Classificacao'
        '400':
          description: ID inválido.
        '404':
          description: Produto não encontrado.
        '500':
          description: Erro interno no servidor.

    put:
      tags: [PRODUTO]
      summary: Atualiza um produto existente
      requestBody:
        required: true
        content:
          application:json:
            schema:
              $ref: '#/components/schemas/ProdutoInput'
      responses:
        '200':
          description: Produto atualizado com sucesso.
        '400':
          description: ID ou dados inválidos.
        '404':
          description: Produtos não encontrados.
        '500':
          description: Erro interno no servidor.

    delete:
      tags: [PRODUTO]
      summary: Exclui um produto pelo ID
      responses:
        '200':
          description: Produto excluído.
        '400':
          description: ID inválido.
        '404':
          description: Produto não encontrada.
        '500':
          description: Erro interno no servidor.

  
    post:
      tags: [ADMINISTRADOR]
      summary: Cria um novo administrador
      description: Cadastra um novo administrador.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdministradorInput'
      responses:
        '201':
          description: Administrador criado com sucesso.
        '400':
          description: Dados inválidos.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/administradores/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID numérico do administrador
        schema:
          type: integer

    get:
      tags: [ADMINISTRADOR]
      summary: Busca um administrador pelo ID
      responses:
        '200':
          description: Administrador encontrado.
        '400':
          description: ID inválido.
        '404':
          description: Administrador não encontrado.
        '500':
          description: Erro interno no servidor.

    put:
      tags: [ADMINISTRADOR]
      summary: Atualiza um administrador existente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdministradorInput'
      responses:
        '200':
          description: Administrador atualizado com sucesso.
        '400':
          description: Dados inválidos.
        '404':
          description: Administrador não encontrado.
        '500':
          description: Erro interno no servidor.

    delete:
      tags: [ADMINISTRADOR]
      summary: Exclui um administrador pelo ID
      responses:
        '200':
          description: Administrador excluído.
        '400':
          description: ID inválido.
        '404':
          description: Administrador não encontrado.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/ingredientes:
    get:
      tags: [IGREDIENTE]
      summary: Lista todos os ingredientes
      description: Retorna uma lista com todos os ingredientes cadastrados.
      responses:
        '200':
          description: Lista de ingredientes retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingrediente'
        '500':
          description: Erro interno no servidor.

    post:
      tags: [IGREDIENTE]
      summary: Cria um novo ingrediente
      description: Cadastra um novo ingrediente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredienteInput'
      responses:
        '201':
          description: Ingrediente criado com sucesso.
        '400':
          description: Dados inválidos.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/ingredientes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID numérico do ingrediente
        schema:
          type: integer

    get:
      tags: [IGREDIENTE]
      summary: Busca um ingrediente pelo ID
      responses:
        '200':
          description: Ingrediente encontrado.
        '400':
          description: ID inválido.
        '404':
          description: Ingrediente não encontrado.
        '500':
          description: Erro interno no servidor.

    put:
      tags: [IGREDIENTE]
      summary: Atualiza um ingrediente existente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredienteInput'
      responses:
        '200':
          description: Ingrediente atualizado com sucesso.
        '400':
          description: Dados inválidos.
        '404':
          description: Ingrediente não encontrado.
        '500':
          description: Erro interno no servidor.

    delete:
      tags: [IGREDIENTE]
      summary: Exclui um ingrediente pelo ID
      responses:
        '200':
          description: Ingrediente excluído.
        '400':
          description: ID inválido.
        '404':
          description: Ingrediente não encontrado.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/categorias:
    get:
      tags: [CATEGORIA]
      summary: Lista todas as categorias
      description: Retorna uma lista com todas as categorias cadastradas.
      responses:
        '200':
          description: Lista de categorias retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Categoria'
        '500':
          description: Erro interno no servidor.

    post:
      tags: [CATEGORIA]
      summary: Cria uma nova categoria
      description: Cadastra uma nova categoria.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoriaInput'
      responses:
        '201':
          description: Categoria criada com sucesso.
        '400':
          description: Dados inválidos.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/categorias/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID numérico da categoria
        schema:
          type: integer

    get:
      tags: [CATEGORIA]
      summary: Busca uma categoria pelo ID
      responses:
        '200':
          description: Categoria encontrada.
        '400':
          description: ID inválido.
        '404':
          description: Categoria não encontrada.
        '500':
          description: Erro interno no servidor.

    put:
      tags: [CATEGORIA]
      summary: Atualiza uma categoria existente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoriaInput'
      responses:
        '200':
          description: Categoria atualizada com sucesso.
        '400':
          description: Dados inválidos.
        '404':
          description: Categoria não encontrada.
        '500':
          description: Erro interno no servidor.

    delete:
      tags: [CATEGORIA]
      summary: Exclui uma categoria pelo ID
      responses:
        '200':
          description: Categoria excluída.
        '400':
          description: ID inválido.
        '404':
          description: Categoria não encontrada.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/tipos-sabor:
    get:
      tags: [TIPO_SABOR]
      summary: Lista todos os tipos de sabor
      description: Retorna uma lista com todos os tipos de sabor cadastrados.
      responses:
        '200':
          description: Lista de tipos de sabor retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TipoSabor'
        '500':
          description: Erro interno no servidor.

    post:
      tags: [TIPO_SABOR]
      summary: Cria um novo tipo de sabor
      description: Cadastra um novo tipo de sabor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TipoSaborInput'
      responses:
        '201':
          description: Tipo de sabor criado com sucesso.
        '400':
          description: Dados inválidos.
        '500':
          description: Erro interno no servidor.

  /v1/senai/hamburgueria/tipos-sabor/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID numérico do tipo de sabor
        schema:
          type: integer

    get:
      tags: [TIPO_SABOR]
      summary: Busca um tipo de sabor pelo ID
      responses:
        '200':
          description: Tipo de sabor encontrado.
        '400':
          description: ID inválido.
        '404':
          description: Tipo de sabor não encontrado.
        '500':
          description: Erro interno no servidor.

    put:
      tags: [TIPO_SABOR]
      summary: Atualiza um tipo de sabor existente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TipoSaborInput'
      responses:
        '200':
          description: Tipo de sabor atualizado com sucesso.
        '400':
          description: Dados inválidos.
        '404':
          description: Tipo de sabor não encontrado.
        '500':
          description: Erro interno no servidor.

    delete:
      tags: [TIPO_SABOR]
      summary: Exclui um tipo de sabor pelo ID
      responses:
        '200':
          description: Tipo de sabor excluído.
        '400':
          description: ID inválido.
        '404':
          description: Tipo de sabor não encontrado.
        '500':
          description: Erro interno no servidor.

components:
  schemas:

    Produto:
      type: object
      properties:
        id:
          type: integer
          exemplo: 1

        nome:
          type: string
          exemplo: "Hambúrguer"

        descricao:
          type: string
          exemplo: "Categoria de hambúrgueres artesanais"

      required:
        - id
        - nome

    ProdutoInput:
      type: object
      properties:
        nome:
          type: string
          exemplo: "Hambúrguer"

        descricao:
          type: string
          exemplo: "Categoria de hambúrgueres artesanais"

      required:
        - nome

    Administrador:
     type: object
     properties:
        id:
          type: integer
          example: 1

    nome:
        type: string
        example: "Matheus"

    email:
      type: string
      example: "matheus@gmail.com"

  required:
    - id
    - nome
    - email

AdministradorInput:
  type: object
  properties:
    nome:
      type: string
      example: "Matheus"

    email:
      type: string
      example: "matheus@gmail.com"

  required:
    - nome
    - email

Ingrediente:
  type: object
  properties:
    id:
      type: integer
      example: 1

    nome:
      type: string
      example: "Queijo Cheddar"

    descricao:
      type: string
      example: "Queijo cheddar cremoso"

  required:
    - id
    - nome

IngredienteInput:
  type: object
  properties:
    nome:
      type: string
      example: "Queijo Cheddar"

    descricao:
      type: string
      example: "Queijo cheddar cremoso"

  required:
    - nome

Categoria:
  type: object
  properties:
    id:
      type: integer
      example: 1

    nome:
      type: string
      example: "Hambúrguer"

    descricao:
      type: string
      example: "Categoria destinada aos hambúrgueres"

  required:
    - id
    - nome

CategoriaInput:
  type: object
  properties:
    nome:
      type: string
      example: "Hambúrguer"

    descricao:
      type: string
      example: "Categoria destinada aos hambúrgueres"

  required:
    - nome

TipoSabor:
  type: object
  properties:
    id:
      type: integer
      example: 1

    nome:
      type: string
      example: "Salgado"

    descricao:
      type: string
      example: "Produtos com sabor salgado"

  required:
    - id
    - nome

TipoSaborInput:
  type: object
  properties:
    nome:
      type: string
      example: "Salgado"

    descricao:
      type: string
      example: "Produtos com sabor salgado"

  required:
    - nome