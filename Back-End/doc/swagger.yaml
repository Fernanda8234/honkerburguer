components:
  schemas:

    Produto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          maxLength: 255
          example: "X-Bacon Artesanal"
        preco:
          type: number
          format: double
          example: 32.90
        url_imagem:
          type: string
          maxLength: 255
          example: "https://storage.hamburgueria.com/produtos/x-bacon.jpg"
        descricao:
          type: string
          example: "Hambúrguer artesanal com bacon crocante e queijo cheddar."
        data_criacao:
          type: string
          format: date-time
          example: "2024-01-15T10:00:00Z"
        disponibilidade:
          type: integer
          description: "0 = indisponível, 1 = disponível"
          enum: [0, 1]
          example: 1
        desconto:
          type: number
          format: double
          example: 5.00
        data_inicio_campanha:
          type: string
          format: date-time
          nullable: true
          example: "2024-07-01T00:00:00Z"
        data_fim_campanha:
          type: string
          format: date-time
          nullable: true
          example: "2024-07-31T23:59:59Z"
        classificacao_alimentar:
          type: string
          maxLength: 50
          example: "Normal"
      required:
        - id
        - nome
        - preco
        - disponibilidade

    ProdutoInput:
      type: object
      properties:
        nome:
          type: string
          maxLength: 255
          example: "X-Salada"
        preco:
          type: number
          format: double
          example: 28.50
        url_imagem:
          type: string
          maxLength: 255
          example: "https://storage.hamburgueria.com/produtos/x-salada.jpg"
        descricao:
          type: string
          example: "Hambúrguer com alface, tomate e maionese especial."
        disponibilidade:
          type: integer
          enum: [0, 1]
          example: 1
        desconto:
          type: number
          format: double
          example: 0.00
        data_inicio_campanha:
          type: string
          format: date-time
          nullable: true
          example: null
        data_fim_campanha:
          type: string
          format: date-time
          nullable: true
          example: null
        classificacao_alimentar:
          type: string
          maxLength: 50
          example: "Normal"
      required:
        - nome
        - preco
        - disponibilidade

    Administrador:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          maxLength: 255
          example: "Matheus Aguiar"
        email:
          type: string
          format: email
          maxLength: 255
          example: "matheus@hamburgueria.com"
        senha:
          type: string
          maxLength: 255
          example: "********"
        criacao_conta:
          type: string
          format: date
          example: "2024-01-01"
        data_nascimento:
          type: string
          format: date
          example: "2000-05-20"
        telefone:
          type: string
          maxLength: 20
          example: "(11) 91234-5678"
        codigo_acesso:
          type: integer
          example: 123456
      required:
        - id
        - nome
        - email
        - senha

    AdministradorInput:
      type: object
      properties:
        nome:
          type: string
          maxLength: 255
          example: "Carlos Silva"
        email:
          type: string
          format: email
          maxLength: 255
          example: "carlos@hamburgueria.com"
        senha:
          type: string
          format: password
          maxLength: 255
          example: "Senh@F0rte123"
        data_nascimento:
          type: string
          format: date
          example: "1995-08-15"
        telefone:
          type: string
          maxLength: 20
          example: "(11) 98765-4321"
        codigo_acesso:
          type: integer
          example: 654321
      required:
        - nome
        - email
        - senha

    Ingrediente:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          maxLength: 45
          example: "Queijo Cheddar"
        descricao:
          type: string
          example: "Queijo cheddar cremoso importado."
        status:
          type: integer
          description: "0 = inativo, 1 = ativo"
          enum: [0, 1]
          example: 1
        url_image:
          type: string
          maxLength: 255
          example: "https://storage.hamburgueria.com/ingredientes/cheddar.jpg"
        id_produto:
          type: integer
          example: 1
      required:
        - id
        - nome
        - status
        - id_produto

    IngredienteInput:
      type: object
      properties:
        nome:
          type: string
          maxLength: 45
          example: "Bacon Defumado"
        descricao:
          type: string
          example: "Bacon defumado artesanalmente."
        status:
          type: integer
          enum: [0, 1]
          example: 1
        url_image:
          type: string
          maxLength: 255
          example: "https://storage.hamburgueria.com/ingredientes/bacon.jpg"
        id_produto:
          type: integer
          example: 1
      required:
        - nome
        - status
        - id_produto

    Categoria:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          maxLength: 100
          example: "Hambúrguer"
        descricao:
          type: string
          example: "Categoria destinada aos hambúrgueres artesanais."
      required:
        - id
        - nome

    CategoriaInput:
      type: object
      properties:
        nome:
          type: string
          maxLength: 100
          example: "Sobremesas"
        descricao:
          type: string
          example: "Categoria destinada às sobremesas e doces."
      required:
        - nome

    TipoSabor:
      type: object
      properties:
        id:
          type: integer
          example: 1
        blend:
          type: integer
          description: "0 = sabor simples, 1 = blend de sabores"
          enum: [0, 1]
          example: 0
        nome:
          type: string
          maxLength: 45
          example: "Salgado"
      required:
        - id
        - nome
        - blend

    TipoSaborInput:
      type: object
      properties:
        blend:
          type: integer
          enum: [0, 1]
          example: 0
        nome:
          type: string
          maxLength: 45
          example: "Picante"
      required:
        - nome
        - blend

    Combo:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          maxLength: 150
          example: "Combo Clássico"
      required:
        - id
        - nome

    ComboInput:
      type: object
      properties:
        nome:
          type: string
          maxLength: 150
          example: "Combo Clássico"
      required:
        - nome

    ProdutoCombo:
      type: object
      properties:
        id:
          type: integer
          example: 1
        id_produto:
          type: integer
          example: 2
        id_combo_produto:
          type: integer
          example: 1
      required:
        - id
        - id_produto
        - id_combo_produto

    ProdutoCategoria:
      type: object
      properties:
        id:
          type: integer
          example: 1
        id_categoria:
          type: integer
          example: 1
        id_produto:
          type: integer
          example: 2
      required:
        - id
        - id_categoria
        - id_produto

    TipoSaborProduto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        descricao:
          type: string
          example: "Blend de carnes nobres com toque defumado."
        id_tipo_sabores:
          type: integer
          example: 1
        id_produto:
          type: integer
          example: 2
      required:
        - id
        - id_tipo_sabores
        - id_produto